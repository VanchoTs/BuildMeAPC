<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BuildMeAPC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <img src="images/logo.png" alt="BuildMeAPC"> BuildMeAPC
            </a>
            
            <h1 style="text-align: center; margin-bottom: 1rem;">Forgot Password</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Enter your email to receive a password reset code.</p>

            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Code</button>
            </form>

            <div style="margin-top: 2rem; text-align: center;">
                <p><a href="login.html" style="color: var(--accent-color);">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initLanguageDetection } from './js/i18n.js';
        document.addEventListener('DOMContentLoaded', () => {
            initLanguageDetection();
            const form = document.getElementById('forgot-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const API_URL = `http://${window.location.hostname}:5075/api/auth/forgot-password`;

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(email)
                    });
                    if (res.ok) {
                        localStorage.setItem('resetEmail', email);
                        alert('If an account exists for this email, we have sent a reset code.');
                        window.location.href = 'reset-password.html';
                    } else {
                        alert('Request failed.');
                    }
                } catch (err) {
                    alert('Could not connect to server.');
                }
            });
        });
    </script>
    <script type="module" src="js/ui.js"></script>
</body>
</html>

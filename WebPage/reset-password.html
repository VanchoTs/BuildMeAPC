<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BuildMeAPC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <img src="images/logo.png" alt="BuildMeAPC"> BuildMeAPC
            </a>
            
            <h1 style="text-align: center; margin-bottom: 1rem;">Reset Password</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Enter the code we sent to your email and your new password.</p>

            <form id="reset-form">
                <div class="form-group">
                    <label for="code">6-Digit Code</label>
                    <input type="text" id="code" maxlength="6" required style="text-align: center; letter-spacing: 0.3rem;">
                </div>
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>
            </form>

            <div style="margin-top: 2rem; text-align: center;">
                <p><a href="login.html" style="color: var(--accent-color);">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initLanguageDetection } from './js/i18n.js';
        document.addEventListener('DOMContentLoaded', () => {
            initLanguageDetection();
            const form = document.getElementById('reset-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = localStorage.getItem('resetEmail');
                const code = document.getElementById('code').value;
                const newPassword = document.getElementById('new-password').value;
                
                if (!email) {
                    alert('Session lost. Please try again from Forgot Password page.');
                    window.location.href = 'forgot-password.html';
                    return;
                }

                const API_URL = `http://${window.location.hostname}:5075/api/auth/reset-password`;

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, code, newPassword })
                    });
                    if (res.ok) {
                        alert('Password reset successfully! Please login with your new password.');
                        localStorage.removeItem('resetEmail');
                        window.location.href = 'login.html';
                    } else {
                        const err = await res.text();
                        alert(`Reset failed: ${err}`);
                    }
                } catch (err) {
                    alert('Could not connect to server.');
                }
            });
        });
    </script>
    <script type="module" src="js/ui.js"></script>
</body>
</html>
